    function convertToBanglaNumber(num) {
      const banglaDigits = ["০", "১", "২", "৩", "৪", "৫", "৬", "৭", "৮", "৯"];

        return banglaDigits[digit] || digit;
      }).join("");
    }

      const [noticeBn, setNoticeBn] = useState("স্বর্ণলিপি বুকসে আপনাকে স্বাগত! আমাদের যেকোনো বই কিনতে Buy Now অথবা Add to Bag বাটনে ক্লিক করুন।");
      const [noticeEn, setNoticeEn] = useState("Welcome to Shornolipi Books! Click 'Buy Now' or 'Add to Bag' to purchase your favorite noble titles.");
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedCategory, setSelectedCategory] = useState("all");
      const [cart, setCart] = useState([]);
      const [selectedBook, setSelectedBook] = useState(null);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [currentView, setCurrentView] = useState("shop"); // "shop" | "admin"

      // Checkout form states
      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [checkoutForm, setCheckoutForm] = useState({
        name: "",
        phone: "",
        district: "Dhaka",
        address: "",
        areaType: "urban" // "urban" (city) | "rural" (village/suburb)
      });
      const [isOrderPlaced, setIsOrderPlaced] = useState(false);

      // PWA Install Prompt State
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [showPwaBanner, setShowPwaBanner] = useState(false);

      const t = TRANSLATIONS[lang];

      // Firebase Real-time Synchronization
      useEffect(() => {
        // A. Handle routing hashes
        const handleHashChange = () => {
          if (window.location.hash === "#admin") {
            setCurrentView("admin");
          } else {
            setCurrentView("shop");
          }
        };
        handleHashChange();
        window.addEventListener("hashchange", handleHashChange);

        // B. Database Auto-Seeding & Listeners
        let unsubscribeNotice = null;
        let unsubscribeBooks = null;

        const seedAndSubscribe = async () => {
          try {
            // Notice Board Listener (Safely handles errors/connection dropouts)
            unsubscribeNotice = db.collection("notices").doc("notice_board").onSnapshot((docSnap) => {
              try {
                if (docSnap.exists) {
                  const data = docSnap.data();
                  setNoticeBn(data.noticeBn || "স্বর্ণলিপি বুকসে আপনাকে স্বাগত! আমাদের যেকোনো বই কিনতে Buy Now অথবা Add to Bag বাটনে ক্লিক করুন।");
                  setNoticeEn(data.noticeEn || "Welcome to Shornolipi Books! Click 'Buy Now' or 'Add to Bag' to purchase your favorite noble titles.");
                } else {
                  // If notice board doesn't exist, seed it
                  db.collection("notices").doc("notice_board").set({
                    noticeBn: "স্বর্ণলিপি বুকসে আপনাকে স্বাগত! আমাদের যেকোনো বই কিনতে Buy Now অথবা Add to Bag বাটনে ক্লিক করুন।",
                    noticeEn: "Welcome to Shornolipi Books! Click 'Buy Now' or 'Add to Bag' to purchase your favorite noble titles."
                  }).catch(e => console.warn("Notice board auto-seeding bypassed:", e));
                }
              } catch (innerErr) {
                console.warn("Notice parsing failed, using default notice:", innerErr);
              }
            }, (error) => {
              console.warn("Notice board firestore listener bypassed (running in secure offline/fallback mode):", error);
            });

            // Books collection listener (Safely handles errors/connection dropouts)
            unsubscribeBooks = db.collection("books").onSnapshot((querySnap) => {
              try {
                if (querySnap.empty) {
                  // Seed default books
                  DEFAULT_BOOKS.forEach((b) => {
                    db.collection("books").doc(b.id).set(b).catch(e => console.warn("Book auto-seeding bypassed:", e));
                  });
                  setBooks(DEFAULT_BOOKS);
                } else {
                  const booksList = [];
                  querySnap.forEach((doc) => {
                    booksList.push(doc.data());
                  });
                  setBooks(booksList);
                }
              } catch (innerErr) {
                console.warn("Books list compilation failed, using local fallback copy:", innerErr);
                setBooks(DEFAULT_BOOKS);
              }
            }, (error) => {
              console.warn("Books firestore listener bypassed (running in secure offline/fallback mode):", error);
              setBooks(DEFAULT_BOOKS);
            });
          } catch (e) {
            console.warn("Firebase real-time sync subscription bypassed (running in secure offline/fallback mode): ", e);
            setBooks(DEFAULT_BOOKS);
          }
        };

        seedAndSubscribe();

        // C. Capture PWA Installation Offer
        window.addEventListener("beforeinstallprompt", (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
          setShowPwaBanner(true);
        });

        return () => {
          window.removeEventListener("hashchange", handleHashChange);
          if (unsubscribeNotice) {
            try { unsubscribeNotice(); } catch (err) { console.warn("Notice unsubscribe failed:", err); }
          }
          if (unsubscribeBooks) {
            try { unsubscribeBooks(); } catch (err) { console.warn("Books unsubscribe failed:", err); }
          }
        };
      }, []);

      // Calculate dynamic checkout weights and prices
      const totalWeight = cart.reduce((acc, item) => acc + (item.book.weightKg || 0.3) * item.quantity, 0);
      const subtotal = cart.reduce((acc, item) => acc + item.book.priceNum * item.quantity, 0);

      // Delivery charges formula
      const calculateDelivery = () => {
        if (cart.length === 0) return 0;
        const selectedDistrictObj = DISTRICTS.find(d => d.nameEn === checkoutForm.district || d.nameBn === checkoutForm.district);
        const inDhaka = selectedDistrictObj ? selectedDistrictObj.inDhaka : true;
        
        let baseCharge = inDhaka ? 60 : 120;
        if (checkoutForm.areaType === "rural") {
          baseCharge += 30; // village premium charge
        }
        // Additional weight charges (20 Taka per extra kg beyond 1kg)
        const additionalWeight = Math.max(0, totalWeight - 1);
        const weightCharge = Math.ceil(additionalWeight) * 20;

        return baseCharge + weightCharge;
      };

      const deliveryCharge = calculateDelivery();
      const totalPayable = subtotal + deliveryCharge;

      // Cart Manipulations
      const addToCart = (book, directBuy = false) => {
        setCart(prev => {
          const exists = prev.find(item => item.book.id === book.id);
          if (exists) {
            return prev.map(item => item.book.id === book.id ? { ...item, quantity: item.quantity + 1 } : item);
          }
          return [...prev, { book, quantity: 1 }];
        });

        if (directBuy) {
          setIsCheckoutOpen(true);
        } else {
          setIsCartOpen(true);
        }
      };

      const removeFromCart = (bookId) => {
        setCart(prev => prev.filter(item => item.book.id !== bookId));
      };

      const updateQuantity = (bookId, delta) => {
        setCart(prev => prev.map(item => {
          if (item.book.id === bookId) {
            const newQty = item.quantity + delta;
            return newQty > 0 ? { ...item, quantity: newQty } : item;
          }
          return item;
        }));
      };

      // Trigger PWA installation
      const handleInstallPwa = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === "accepted") {
          console.log("PWA accepted by user");
        }
        setDeferredPrompt(null);
        setShowPwaBanner(false);
      };

      // Handle custom checkouts
      const handleCheckoutSubmit = (e) => {
        e.preventDefault();
        setIsOrderPlaced(true);
        setTimeout(() => {
          setCart([]);
          setIsOrderPlaced(false);
          setIsCheckoutOpen(false);
        }, 4000);
      };

      // Search & Filters
      const categories = ["all", ...Array.from(new Set(books.map(b => lang === "bn" ? b.categoryBn : b.categoryEn)))];

      const filteredBooks = books.filter(b => {
        const title = lang === "bn" ? b.titleBn : b.titleEn;
        const author = lang === "bn" ? b.authorBn : b.authorEn;
        const category = lang === "bn" ? b.categoryBn : b.categoryEn;
        
        const matchesSearch = title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                              author.toLowerCase().includes(searchQuery.toLowerCase());
        
        const matchesCategory = selectedCategory === "all" || category === selectedCategory;
        return matchesSearch && matchesCategory;
      });

      // View Admin Trigger
      const handleBackToShop = () => {
        window.location.hash = "";
        setCurrentView("shop");
      };

      if (currentView === "admin") {
        return (
          <AdminPanel 
            books={books} 
            noticeBn={noticeBn} 
            noticeEn={noticeEn} 
            lang={lang} 
            setLang={setLang}
            onBackToShop={handleBackToShop} 
          />
        );
      }

      return (
        <div className={`min-h-screen flex flex-col justify-between ${lang === "bn" ? "font-sans" : "font-sans"}`}>
          
          {/* A. SCROLLING NOTICE MARQUEE */}
          <div className="bg-[#111115] border-y border-gold-medium/30 py-2.5 px-4 overflow-hidden relative flex items-center gap-4">
            <div className="flex items-center gap-1 bg-gold-medium/20 px-2.5 py-0.5 rounded border border-gold-medium/40 text-xs font-bold text-[#FCF6BA] shrink-0 uppercase animate-pulse">
              <Icon name="sparkles" className="w-3.5 h-3.5 text-gold-medium mr-1 inline" />
              <span>{t.notice}</span>
            </div>
            <div className="relative w-full overflow-hidden">
              <div className="text-xs md:text-sm text-gray-200 font-medium tracking-wide whitespace-nowrap animate-marquee-scroll">
                {lang === "bn" ? noticeBn : noticeEn}
              </div>
            </div>
          </div>

          {/* B. HEADER & ROYAL BRAND RAIL */}
          <header className="sticky top-0 z-40 bg-[#070709]/95 backdrop-blur-md border-b border-gold-medium/20">
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
              
              {/* Brand Logo & Name */}
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full border border-gold-medium bg-[#111115] flex items-center justify-center shadow-[0_0_15px_rgba(191,149,63,0.3)] shrink-0">
                  <span className="font-royal text-gold-light font-extrabold text-xl">S</span>
                </div>
                <div>
                  <h1 className="font-royal font-bold text-lg md:text-xl text-white tracking-wider flex items-center gap-1.5">
                    {t.shopName}
                  </h1>
                  <p className="text-[10px] text-gold-medium tracking-widest uppercase font-royal leading-none hidden md:block">
                    {t.shopSubtitle}
                  </p>
                </div>
              </div>

              {/* Language Toggle & Cart Action */}
              <div className="flex items-center gap-4">
                
                {/* PWA Direct Installation Button */}
                {showPwaBanner && (
                  <button 
                    onClick={handleInstallPwa}
                    className="flex items-center gap-1.5 bg-gradient-to-r from-gold-medium to-gold-dark text-black text-xs font-bold px-3 py-1.5 rounded-full hover:scale-105 active:scale-95 transition-all shadow-[0_0_10px_rgba(191,149,63,0.4)] cursor-pointer"
                  >
                    <Icon name="download" className="w-3.5 h-3.5" />
                    <span className="hidden sm:inline">Install App</span>
                  </button>
                )}

                {/* Lang Switch */}
                <button
                  onClick={() => setLang(lang === "bn" ? "en" : "bn")}
                  className="bg-[#111115] hover:bg-gold-medium/10 border border-gold-medium/30 hover:border-gold-medium rounded-lg text-xs font-bold text-gold-light px-3 py-1.5 transition-all cursor-pointer"
                >
                  {lang === "bn" ? "English" : "বাংলা"}
                </button>

                {/* Shopping Bag Button with Badge */}
                <button
                  onClick={() => setIsCartOpen(true)}
                  className="relative p-2 bg-[#111115] hover:bg-gold-medium/10 border border-gold-medium/30 rounded-lg text-gold-light transition-all cursor-pointer"
                >
                  <Icon name="shopping-bag" className="w-5 h-5" />
                  {cart.length > 0 && (
                    <span className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-gradient-to-r from-gold-medium to-gold-dark text-black font-extrabold text-[10px] rounded-full flex items-center justify-center animate-bounce shadow-lg">
                      {cart.reduce((a, c) => a + c.quantity, 0)}
                    </span>
                  )}
                </button>
              </div>

            </div>
          </header>

          {/* C. HERO BANNER */}
          <section className="relative overflow-hidden bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#1f1a10] via-[#070709] to-[#070709] px-4 py-12 md:py-16 text-center border-b border-gold-medium/10">
            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&q=80&w=1200')] opacity-5 bg-cover bg-center"></div>
            
            <div className="relative max-w-4xl mx-auto space-y-6">
              <span className="inline-block border border-gold-medium/40 bg-gold-medium/10 px-4 py-1 rounded-full text-gold-light text-xs font-semibold tracking-wider uppercase">
                {lang === "bn" ? "স্বর্ণালী সাহিত্যের অনন্য ক্যানভাস" : "Curated Royal Library"}
              </span>
              <h2 className="font-royal text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[#FCF6BA] via-[#BF953F] to-[#FCF6BA] tracking-tight leading-tight">
                {t.tagline}
              </h2>

              {/* Dynamic Interactive Search Bar */}
              <div className="max-w-2xl mx-auto relative mt-6">
                <input
                  type="text"
                  placeholder={t.searchPlaceholder}
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full bg-[#111115]/90 border border-gold-medium/30 hover:border-gold-medium/60 focus:border-gold-medium px-5 py-3.5 pl-12 rounded-xl text-sm placeholder-gray-500 text-white focus:outline-none focus:ring-1 focus:ring-gold-medium shadow-[0_4px_30px_rgba(0,0,0,0.5)] font-sans"
                />
                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gold-medium">
                  <Icon name="search" className="w-5 h-5" />
                </div>
              </div>
            </div>
          </section>

          {/* D. CATEGORIES & MAIN BOOK STORE GRID */}
          <main className="flex-1 max-w-7xl mx-auto px-4 py-8 w-full space-y-8">
            
            {/* Horizontal Scroll Categories */}
            <div className="flex items-center gap-2 overflow-x-auto pb-3 border-b border-gold-medium/10 scrollbar-none">
              {categories.map((cat, idx) => (
                <button
                  key={idx}
                  onClick={() => setSelectedCategory(cat)}
                  className={`px-4 py-2 rounded-lg text-xs font-semibold tracking-wider whitespace-nowrap transition-all border cursor-pointer ${
                    selectedCategory === cat
                      ? "bg-gradient-to-r from-gold-medium to-gold-dark text-black border-gold-medium font-bold shadow-[0_2px_15px_rgba(191,149,63,0.3)]"
                      : "bg-[#111115] hover:bg-gold-medium/10 text-gray-400 hover:text-white border-gold-medium/20"
                  }`}
                >
                  {cat === "all" ? t.categoryAll : cat}
                </button>
              ))}
            </div>

            {/* Books Display Grid */}
            {filteredBooks.length === 0 ? (
              <div className="text-center py-16 border border-dashed border-gold-medium/20 rounded-2xl bg-[#111115]/50">
                <Icon name="book-open" className="w-12 h-12 text-gold-medium/40 mx-auto mb-3" />
                <h4 className="text-lg font-bold text-gold-light">কোনো বই পাওয়া যায়নি!</h4>
                <p className="text-xs text-gray-500 mt-1">অনুগ্রহ করে ভিন্ন কোনো শব্দ দিয়ে পুনরায় অনুসন্ধান করুন।</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                {filteredBooks.map((book) => {
                  const title = lang === "bn" ? book.titleBn : book.titleEn;
                  const author = lang === "bn" ? book.authorBn : book.authorEn;
                  const desc = lang === "bn" ? book.descriptionBn : book.descriptionEn;
                  const category = lang === "bn" ? book.categoryBn : book.categoryEn;
                  const price = lang === "bn" ? book.priceBn : book.priceEn;

                  return (
                    <div 
                      key={book.id}
                      className="group flex flex-col justify-between bg-[#111115] border border-gold-medium/10 hover:border-gold-medium/40 rounded-xl overflow-hidden transition-all duration-300 hover:-translate-y-1.5 shadow-[0_4px_25px_rgba(0,0,0,0.6)]"
                    >
                      {/* Interactive Cover Hover Container */}
                      <div 
                        onClick={() => setSelectedBook(book)}
                        className="relative h-56 bg-[#070709] overflow-hidden cursor-pointer flex items-center justify-center group/cover"
                      >
                        <img 
                          src={book.image} 
                          alt={title}
                          className="w-full h-full object-cover opacity-80 group-hover/cover:opacity-100 group-hover/cover:scale-105 transition-all duration-500"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-[#111115] via-transparent to-transparent"></div>
                        
                        {/* Elegant Rating Badge */}
                        <div className="absolute top-3 right-3 bg-[#070709]/90 border border-gold-medium/30 px-2 py-0.5 rounded text-[10px] text-gold-light font-extrabold flex items-center gap-1">
                          <Icon name="star" className="w-3 h-3 text-gold-medium inline" fill="#BF953F" />
                          <span>{book.rating || 5.0}</span>
                        </div>
                      </div>

                      {/* Content details */}
                      <div className="p-4 flex-1 flex flex-col justify-between space-y-3">
                        <div className="space-y-1.5">
                          <span className="text-[9px] text-gold-medium uppercase tracking-wider font-royal">
                            {category}
                          </span>
                          <h3 
                            onClick={() => setSelectedBook(book)}
                            className="font-bold text-sm md:text-base text-white hover:text-gold-light cursor-pointer transition-colors line-clamp-1"
                          >
                            {title}
                          </h3>
                          <p className="text-xs text-gray-400 line-clamp-1">{author}</p>
                          <p className="text-xs text-gray-500 line-clamp-2 leading-relaxed">{desc}</p>
                        </div>

                        {/* Price Tag & Interactive Controls */}
                        <div className="pt-3 border-t border-gold-medium/10 flex items-center justify-between">
                          <div className="text-left">
                            <span className="text-[10px] text-gray-500 block uppercase tracking-wider">Price</span>
                            <span className="text-base font-extrabold text-[#FCF6BA]">{price}</span>
                          </div>

                          <div className="flex gap-1.5 shrink-0">
                            {/* Add to bag */}
                            <button
                              onClick={() => addToCart(book)}
                              className="p-2 bg-[#070709] border border-gold-medium/30 hover:bg-gold-medium hover:text-black rounded-lg text-gold-light transition-all cursor-pointer"
                              title={t.addToBag}
                            >
                              <Icon name="shopping-bag" className="w-4 h-4" />
                            </button>
                            {/* Buy Now */}
                            <button
                              onClick={() => addToCart(book, true)}
                              className="btn-gold-shimmer px-3 py-1.5 bg-gradient-to-r from-gold-medium to-gold-dark hover:from-gold-light hover:to-gold-medium text-black text-xs font-bold rounded-lg transition-all cursor-pointer"
                            >
                              {t.buyNow}
                            </button>
                          </div>
                        </div>
                      </div>

                    </div>
                  );
                })}
              </div>
            )}
          </main>

          {/* E. PERSISTENT SHOP FOOTER WITH SECURE LOCK */}
          <footer className="mt-16 bg-[#111115] border-t border-gold-medium/10 py-8 px-4 text-center text-xs text-gray-500">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-2">
                <span className="font-royal font-bold text-gold-light text-sm">{t.shopName}</span>
                <span className="text-gray-600">|</span>
                <p>{t.footerText}</p>
              </div>
              <div className="flex items-center gap-3">
                <a 
                  href="#admin" 
                  className="text-[10px] text-gold-medium/50 hover:text-gold-light border border-gold-medium/20 hover:border-gold-medium/60 px-2.5 py-1 rounded transition-all flex items-center gap-1 bg-[#070709]"
                >
                  <Icon name="shield" className="w-3 h-3 inline" />
                  <span>🛡️ Admin Console</span>
                </a>
              </div>
            </div>
          </footer>

          {/* ========================================================
              F. MODAL: DETAILED BOOK SPECS VIEW
              ======================================================== */}
          {selectedBook && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="w-full max-w-2xl bg-[#111115] border border-gold-medium/30 rounded-2xl shadow-2xl p-6 relative max-h-[90vh] overflow-y-auto">
                <button 
                  onClick={() => setSelectedBook(null)}
                  className="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors p-1 bg-[#070709] rounded-full border border-gold-medium/20 cursor-pointer"
                >
                  <i data-lucide="x" class="w-5 h-5"></i>
                </button>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-2">
                  {/* Cover */}
                  <div className="h-72 md:h-full bg-[#070709] rounded-xl border border-gold-medium/10 overflow-hidden flex items-center justify-center">
                    <img src={selectedBook.image} alt={selectedBook.titleEn} className="w-full h-full object-cover" />
                  </div>

                  {/* Metadata Specs */}
                  <div className="flex flex-col justify-between space-y-4">
                    <div className="space-y-2">
                      <span className="text-[10px] text-gold-medium font-bold uppercase tracking-widest border border-gold-medium/20 px-2 py-0.5 rounded bg-gold-medium/5">
                        {lang === "bn" ? selectedBook.categoryBn : selectedBook.categoryEn}
                      </span>
                      <h3 className="font-royal font-bold text-xl md:text-2xl text-white">
                        {lang === "bn" ? selectedBook.titleBn : selectedBook.titleEn}
                      </h3>
                      <p className="text-sm text-gold-light font-semibold">{lang === "bn" ? selectedBook.authorBn : selectedBook.authorEn}</p>
                      
                      {/* Specifications Box */}
                      <div className="bg-[#070709] border border-gold-medium/10 rounded-lg p-3 space-y-1.5 text-xs text-gray-400">
                        <div className="flex justify-between"><span className="text-gray-500">{t.rating}:</span><span className="font-bold text-gold-light">⭐ {selectedBook.rating || 4.8}</span></div>
                        <div className="flex justify-between"><span className="text-gray-500">{t.pages}:</span><span>{selectedBook.pages || 180}</span></div>
                        <div className="flex justify-between"><span className="text-gray-500">{t.year}:</span><span>{selectedBook.year || "2024"}</span></div>
                        <div className="flex justify-between"><span className="text-gray-500">{t.weight}:</span><span>{selectedBook.weightKg || 0.3} Kg</span></div>
                      </div>

                      <p className="text-xs text-gray-300 leading-relaxed font-sans mt-3">
                        {lang === "bn" ? selectedBook.descriptionBn : selectedBook.descriptionEn}
                      </p>
                    </div>

                    <div className="pt-4 border-t border-gold-medium/10 flex items-center justify-between">
                      <div className="text-left">
                        <span className="text-xs text-gray-500 block uppercase">Payable Price</span>
                        <span className="text-xl font-extrabold text-[#FCF6BA]">{lang === "bn" ? selectedBook.priceBn : selectedBook.priceEn}</span>
                      </div>
                      <div className="flex gap-2">

              setUserEmail(email);
              setAuthError(null);
            } else {
              // Sign out immediately if unauthorized
              auth.signOut();
              setAuthError(
                lang === "bn"
                  ? "প্রবেশাধিকার প্রত্যাখ্যান! কেবল bdhecker34@gmail.com অনুমোদিত।"
                  : "Access Denied! Only bdhecker34@gmail.com has administrative authorization."

              setIsAdminLoggedIn(false);

            setUserEmail("");

              : "Google Sign-In Failed! Verify Firebase configuration details."

          id: bookId,
          titleEn: formTitleEn,
          titleBn: formTitleBn,
          authorEn: formAuthorEn,
          authorBn: formAuthorBn,
          priceEn: `৳${formPriceNum}`,
          priceBn: `৳${convertToBanglaNumber(formPriceNum)}`,
          priceNum: Number(formPriceNum),
          descriptionEn: formDescriptionEn,
          descriptionBn: formDescriptionBn,

          image: formImage,
          rating: 4.8,
          pages: Number(formPages),
          year: formYear,
          weightKg: Number(formWeight)
        };

          await db.collection("books").doc(bookId).set(bookData);
